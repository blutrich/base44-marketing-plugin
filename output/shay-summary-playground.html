    category: "clarity",
    status: "pending",
    userComment: "",
    showComment: false
  }
];

let state = {
  suggestions: suggestions,
  activeFilter: "all",
  activeSuggestionId: null
};

function getSuggestionForLine(lineNum) {
  return state.suggestions.find(s => lineNum >= s.lineStart && lineNum <= s.lineEnd);
}

function renderDocument() {
  const panel = document.getElementById('docPanel');
  let html = '';
  let inCodeBlock = false;

  DOC_LINES.forEach((line, i) => {
    const lineNum = i + 1;
    const suggestion = getSuggestionForLine(lineNum);
    let statusClass = '';
    let extraClass = '';

    if (suggestion) {
      statusClass = 'has-suggestion';
      if (suggestion.status === 'approved') statusClass = 'has-suggestion approved';
      if (suggestion.status === 'rejected') statusClass = 'has-suggestion rejected';
    }

    if (state.activeSuggestionId && suggestion && suggestion.id === state.activeSuggestionId) {
      extraClass = ' active-highlight';
    }

    let rendered = escapeHtml(line);

    if (line === '---') {
      html += `<div class="doc-line ${statusClass}${extraClass}" data-line="${lineNum}" onclick="handleLineClick(${lineNum})">
        <span class="line-num">${lineNum}</span>
        <span class="line-content"><div class="hr-line"></div></span>
      </div>`;
      return;
    }

    if (line.startsWith('```')) {
      inCodeBlock = !inCodeBlock;
      return;
    }

    if (line.startsWith('| ') || line.startsWith('|--')) {
      html += `<div class="doc-line ${statusClass}${extraClass}" data-line="${lineNum}" onclick="handleLineClick(${lineNum})">
        <span class="line-num">${lineNum}</span>
        <span class="line-content table-line">${rendered}</span>
      </div>`;
      return;
    }

    if (!inCodeBlock) {
      if (line.startsWith('### ')) {
        rendered = `<h3>${formatInline(line.slice(4))}</h3>`;
      } else if (line.startsWith('## ')) {
        rendered = `<h2>${formatInline(line.slice(3))}</h2>`;
      } else if (line.startsWith('# ')) {
        rendered = `<h1>${formatInline(line.slice(2))}</h1>`;
      } else {
        rendered = formatInline(rendered);
      }
    }

    html += `<div class="doc-line ${statusClass}${extraClass}" data-line="${lineNum}" onclick="handleLineClick(${lineNum})">
      <span class="line-num">${lineNum}</span>
      <span class="line-content">${rendered || '&nbsp;'}</span>
    </div>`;
  });

  panel.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatInline(str) {
  str = str.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  str = str.replace(/`([^`]+)`/g, '<code>$1</code>');
  str = str.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
  return str;
}

function handleLineClick(lineNum) {
  const suggestion = getSuggestionForLine(lineNum);
  if (suggestion) {
    state.activeSuggestionId = suggestion.id;
    renderAll();
    const card = document.querySelector(`.suggestion-card[data-id="${suggestion.id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderSuggestions() {
  const list = document.getElementById('suggestionsList');
  const filtered = state.activeFilter === 'all'
    ? state.suggestions
    : state.suggestions.filter(s => s.status === state.activeFilter);

  let html = '';
  filtered.forEach(s => {
    const catClass = `cat-${s.category}`;
    const statusClass = s.status !== 'pending' ? `status-${s.status}` : '';
    const activeClass = s.id === state.activeSuggestionId ? 'active' : '';

    html += `<div class="suggestion-card ${statusClass} ${activeClass}" data-id="${s.id}" onclick="selectSuggestion(${s.id})">
      <div class="card-header">
        <span class="card-line-ref">${s.lineRef}</span>
        <span class="card-category ${catClass}">${s.category}</span>
      </div>
      <div class="card-suggestion">${s.suggestion}</div>
      <div class="card-actions">
        ${s.status === 'pending' ? `
          <button class="btn-approve" onclick="event.stopPropagation(); setStatus(${s.id}, 'approved')">Approve</button>
          <button class="btn-reject" onclick="event.stopPropagation(); setStatus(${s.id}, 'rejected')">Reject</button>
          <button class="btn-comment" onclick="event.stopPropagation(); toggleComment(${s.id})">Comment</button>
        ` : `
          <button class="btn-reset" onclick="event.stopPropagation(); setStatus(${s.id}, 'pending')">Reset</button>
          <button class="btn-comment" onclick="event.stopPropagation(); toggleComment(${s.id})">Comment</button>
        `}
      </div>
      <div class="comment-area ${s.showComment ? 'visible' : ''}">
        <textarea placeholder="Add a note..." oninput="updateComment(${s.id}, this.value)" onclick="event.stopPropagation()">${s.userComment}</textarea>
      </div>
    </div>`;
  });

  list.innerHTML = html || '<div style="padding:20px;color:#484f58;text-align:center;font-size:13px;">No suggestions match this filter.</div>';
}

function selectSuggestion(id) {
  state.activeSuggestionId = id;
  renderAll();

  const suggestion = state.suggestions.find(s => s.id === id);
  if (suggestion) {
    const lineEl = document.querySelector(`.doc-line[data-line="${suggestion.lineStart}"]`);
    if (lineEl) lineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function setStatus(id, status) {
  const s = state.suggestions.find(s => s.id === id);
  if (s) s.status = status;
  renderAll();
}

function toggleComment(id) {
  const s = state.suggestions.find(s => s.id === id);
  if (s) s.showComment = !s.showComment;
  renderSuggestions();
}

function updateComment(id, value) {
  const s = state.suggestions.find(s => s.id === id);
  if (s) s.userComment = value;
  updatePrompt();
}

function updateStats() {
  const counts = { pending: 0, approved: 0, rejected: 0 };
  state.suggestions.forEach(s => counts[s.status]++);
  document.getElementById('stat-pending').textContent = counts.pending;
  document.getElementById('stat-approved').textContent = counts.approved;
  document.getElementById('stat-rejected').textContent = counts.rejected;
  document.getElementById('count-all').textContent = state.suggestions.length;
  document.getElementById('count-pending').textContent = counts.pending;
  document.getElementById('count-approved').textContent = counts.approved;
  document.getElementById('count-rejected').textContent = counts.rejected;
}

function updatePrompt() {
  const output = document.getElementById('promptOutput');
  const approved = state.suggestions.filter(s => s.status === 'approved');
  const commented = state.suggestions.filter(s => s.userComment.trim() && s.status !== 'approved');
  const rejected = state.suggestions.filter(s => s.status === 'rejected');

  if (approved.length === 0 && commented.length === 0) {
    output.innerHTML = '<span class="placeholder">Approve suggestions or add comments to generate a revision prompt.</span>';
    return;
  }

  let prompt = 'Please revise the Shay summary (output/shay-summary-jan21-feb17.md) with the following changes:\n\n';

  if (approved.length > 0) {
    prompt += '## Approved Changes\n\n';
    approved.forEach(s => {
      prompt += `**${s.lineRef}:** ${s.suggestion}`;
      if (s.userComment.trim()) prompt += `\n  Note: ${s.userComment.trim()}`;
      prompt += '\n\n';
    });
  }

  if (commented.length > 0) {
    prompt += '## Additional Feedback\n\n';
    commented.forEach(s => {
      prompt += `**${s.lineRef}** (${s.category}): ${s.userComment.trim()}\n\n`;
    });
  }

  if (rejected.length > 0) {
    prompt += '## Rejected (keep as-is)\n\n';
    rejected.forEach(s => {
      prompt += `- ${s.lineRef}: ${s.suggestion.substring(0, 60)}...\n`;
    });
  }

  output.textContent = prompt;
}

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  if (text.includes('Approve suggestions')) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function renderAll() {
  renderDocument();
  renderSuggestions();
  updateStats();
  updatePrompt();
}

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.activeFilter = tab.dataset.filter;
    renderSuggestions();
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'a' && state.activeSuggestionId) {
    setStatus(state.activeSuggestionId, 'approved');
  } else if (e.key === 'r' && state.activeSuggestionId) {
    setStatus(state.activeSuggestionId, 'rejected');
  } else if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    navigateSuggestion(1);
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    navigateSuggestion(-1);
  }
});

function navigateSuggestion(dir) {
  const filtered = state.activeFilter === 'all'
    ? state.suggestions
    : state.suggestions.filter(s => s.status === state.activeFilter);
  if (filtered.length === 0) return;

  const idx = filtered.findIndex(s => s.id === state.activeSuggestionId);
  let next = idx + dir;
  if (next < 0) next = filtered.length - 1;
  if (next >= filtered.length) next = 0;
  selectSuggestion(filtered[next].id);
}

// Init
renderAll();
</script>
</body>
</html>
