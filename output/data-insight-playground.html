<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base44 Data Insight Explorer</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117; color: #c9d1d9;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d;
  }
  .header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
  .header .badge {
    font-size: 11px; background: #1f6feb33; color: #58a6ff;
    padding: 2px 8px; border-radius: 10px;
  }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 340px; min-width: 340px; background: #161b22;
    border-right: 1px solid #30363d; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: #8b949e; margin-bottom: 6px; font-weight: 600;
  }

  /* Query cards */
  .query-grid { display: flex; flex-direction: column; gap: 4px; }
  .query-card {
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s;
    font-size: 13px; color: #c9d1d9;
  }
  .query-card:hover { background: #1c2128; border-color: #30363d; }
  .query-card.active { background: #1f6feb22; border-color: #1f6feb; color: #58a6ff; }
  .query-card .qid { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: #8b949e; }
  .query-card .qlabel { font-size: 12px; margin-top: 2px; }

  /* Category chips */
  .category-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .chip {
    font-size: 11px; padding: 3px 10px; border-radius: 12px;
    cursor: pointer; border: 1px solid #30363d; color: #8b949e;
    transition: all 0.15s; background: transparent;
  }
  .chip:hover { border-color: #58a6ff; color: #58a6ff; }
  .chip.active { background: #1f6feb33; border-color: #1f6feb; color: #58a6ff; }

  /* Filters */
  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-row { display: flex; gap: 8px; align-items: center; }
  .filter-row label { font-size: 12px; color: #8b949e; min-width: 70px; }
  .filter-row input, .filter-row select {
    flex: 1; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
    padding: 6px 10px; border-radius: 4px; font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .filter-row input:focus, .filter-row select:focus { outline: none; border-color: #1f6feb; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; gap: 8px; }
  .toggle {
    width: 36px; height: 20px; border-radius: 10px; background: #30363d;
    position: relative; cursor: pointer; transition: background 0.2s;
  }
  .toggle.on { background: #1f6feb; }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%; background: #f0f6fc;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }
  .toggle-label { font-size: 12px; color: #8b949e; }

  /* Presets */
  .presets { display: flex; flex-wrap: wrap; gap: 4px; }
  .preset-btn {
    font-size: 11px; padding: 4px 12px; border-radius: 4px;
    border: 1px solid #30363d; background: transparent; color: #8b949e;
    cursor: pointer; transition: all 0.15s;
  }
  .preset-btn:hover { border-color: #f0883e; color: #f0883e; }
  .preset-btn.active { background: #f0883e22; border-color: #f0883e; color: #f0883e; }

  /* Right panel */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Info bar */
  .info-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: #161b22; border-bottom: 1px solid #30363d;
    font-size: 12px;
  }
  .info-bar .query-name { color: #f0883e; font-weight: 600; font-family: 'SF Mono', monospace; }
  .info-bar .tables { color: #8b949e; }
  .info-bar .tables span { color: #7ee787; }

  /* SQL Preview */
  .sql-preview {
    flex: 1; overflow-y: auto; padding: 20px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px; line-height: 1.6; white-space: pre-wrap;
    background: #0d1117;
  }
  .kw { color: #ff7b72; font-weight: 600; }
  .fn { color: #d2a8ff; }
  .str { color: #a5d6ff; }
  .num { color: #79c0ff; }
  .tbl { color: #7ee787; }
  .col { color: #c9d1d9; }
  .cmt { color: #8b949e; font-style: italic; }
  .op { color: #ff7b72; }

  /* Description */
  .query-desc {
    padding: 12px 20px; background: #161b22; border-top: 1px solid #30363d;
    border-bottom: 1px solid #30363d; font-size: 12px; color: #8b949e;
    line-height: 1.5;
  }
  .query-desc strong { color: #c9d1d9; }

  /* Prompt output */
  .prompt-area {
    background: #161b22; border-top: 1px solid #30363d;
    padding: 16px 20px;
  }
  .prompt-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: #8b949e; margin-bottom: 8px; font-weight: 600;
  }
  .prompt-box {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .prompt-text {
    flex: 1; font-size: 13px; line-height: 1.5; color: #c9d1d9;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 12px; min-height: 60px; max-height: 120px; overflow-y: auto;
  }
  .copy-btn {
    padding: 8px 16px; border-radius: 6px; border: 1px solid #30363d;
    background: #21262d; color: #c9d1d9; font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .copy-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .copy-btn.copied { border-color: #3fb950; color: #3fb950; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<div class="header">
  <h1>Base44 Data Insight Explorer</h1>
  <span class="badge">19 queries / 6 tables</span>
</div>

<div class="main">
  <div class="sidebar">
    <!-- Presets -->
    <div>
      <div class="section-label">Presets</div>
      <div class="presets" id="presets"></div>
    </div>

    <!-- Category filter -->
    <div>
      <div class="section-label">Category</div>
      <div class="category-chips" id="categories"></div>
    </div>

    <!-- Query list -->
    <div>
      <div class="section-label">Queries</div>
      <div class="query-grid" id="queryList"></div>
    </div>

    <!-- Filters -->
    <div id="filtersSection" style="display:none">
      <div class="section-label">Filters</div>
      <div class="filter-group" id="filters"></div>
    </div>

    <!-- Options -->
    <div>
      <div class="section-label">Options</div>
      <div class="filter-group">
        <div class="filter-row">
          <label>Limit</label>
          <input type="number" id="limitInput" value="20" min="1" max="500" />
        </div>
        <div class="filter-row">
          <label>Lookback</label>
          <select id="lookbackSelect">
            <option value="7">7 days</option>
            <option value="14">14 days</option>
            <option value="30" selected>30 days</option>
            <option value="84">12 weeks</option>
            <option value="180">6 months</option>
            <option value="0">All time</option>
          </select>
        </div>
        <div class="toggle-row">
          <div class="toggle" id="verticalToggle" onclick="toggleVertical()"></div>
          <span class="toggle-label">Filter by vertical</span>
        </div>
        <div id="verticalFilter" style="display:none">
          <div class="filter-row">
            <label>Vertical</label>
            <select id="verticalSelect">
              <option value="">All</option>
              <option value="education">Education</option>
              <option value="financial">Financial</option>
              <option value="health">Health & Wellness</option>
              <option value="e-commerce">E-commerce</option>
              <option value="entertainment">Entertainment</option>
              <option value="productivity">Productivity</option>
              <option value="crm">CRM</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="info-bar">
      <span class="query-name" id="infoName">GROWTH_WEEKLY</span>
      <span class="tables" id="infoTables"></span>
    </div>
    <div class="query-desc" id="queryDesc"></div>
    <div class="sql-preview" id="sqlPreview"></div>
    <div class="prompt-area">
      <div class="prompt-label">Prompt Output</div>
      <div class="prompt-box">
        <div class="prompt-text" id="promptText"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
      </div>
    </div>
  </div>
</div>

<script>
const QUERIES = {
  GROWTH_WEEKLY: {
    category: 'Growth', tables: ['wt_base44_users.base'],
    desc: 'Weekly signups, publishes, and premium conversions for the last N weeks.',
    marketing: '"X builders joined last week", signup acceleration trends',
    sql: (s) => `SELECT
  date_trunc('week', created_date) AS week,
  count(DISTINCT user_id) AS new_signups,
  count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) AS published,
  count(DISTINCT CASE WHEN first_premium_ts IS NOT NULL THEN user_id END) AS converted_premium,
  round(100.0 * count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) / count(DISTINCT user_id), 1) AS publish_rate_pct
FROM prod.wt_base44_users.base
WHERE is_qa_user = false
  AND created_date >= current_date - interval '${s.lookback}' day
GROUP BY 1
ORDER BY 1 DESC`
  },
  GROWTH_MONTHLY: {
    category: 'Growth', tables: ['wt_base44_users.base'],
    desc: 'Monthly aggregates with month-over-month % change.',
    marketing: 'Monthly growth narratives, MoM acceleration',
    sql: (s) => `WITH monthly AS (
  SELECT
    date_trunc('month', created_date) AS month,
    count(DISTINCT user_id) AS new_signups,
    count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) AS published
  FROM prod.wt_base44_users.base
  WHERE is_qa_user = false
    AND created_date >= current_date - interval '${s.lookback}' day
  GROUP BY 1
)
SELECT month, new_signups, published,
  round(100.0 * (new_signups - lag(new_signups) OVER (ORDER BY month)) / lag(new_signups) OVER (ORDER BY month), 1) AS signup_mom_pct
FROM monthly
ORDER BY month DESC`
  },
  LLM_MODELS: {
    category: 'Models', tables: ['base44.datadog_llm_spans_log'],
    desc: 'Model usage distribution - top models by call volume.',
    marketing: '"Builders use 15+ AI models", model distribution',
    sql: (s) => `SELECT
  model_name, model_provider,
  count(*) AS total_calls,
  round(100.0 * count(*) / sum(count(*)) OVER (), 1) AS pct_of_calls,
  sum(total_tokens) AS total_tokens,
  round(sum(estimated_total_cost), 2) AS total_cost_usd
FROM prod.base44.datadog_llm_spans_log
WHERE timestamp >= current_date - interval '${s.lookback}' day
GROUP BY 1, 2
ORDER BY total_calls DESC
LIMIT ${s.limit}`
  },
  LLM_TREND: {
    category: 'Models', tables: ['base44.datadog_llm_spans_log'],
    desc: 'Weekly model usage trends - track adoption curves.',
    marketing: '"GPT-5 adoption growing", model trend narratives',
    sql: (s) => `SELECT
  date_trunc('week', timestamp) AS week,
  model_name, model_provider,
  count(*) AS calls, sum(total_tokens) AS tokens
FROM prod.base44.datadog_llm_spans_log
WHERE timestamp >= current_date - interval '${s.lookback}' day
GROUP BY 1, 2, 3
ORDER BY 1 DESC, calls DESC`
  },
  PREMIUM_FUNNEL: {
    category: 'Funnel', tables: ['wt_base44_users.base'],
    desc: 'Tier distribution and activity rates for active premium builders.',
    marketing: 'Tier breakdown, "80% of premium builders publish an app"',
    sql: (s) => `SELECT
  subscription_tier,
  count(DISTINCT user_id) AS total_users,
  count(DISTINCT CASE WHEN is_active_premium_user = true THEN user_id END) AS active_premium,
  count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) AS has_published,
  round(100.0 * count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) / count(DISTINCT user_id), 1) AS publish_rate_pct
FROM prod.wt_base44_users.base
WHERE is_qa_user = false
GROUP BY 1
ORDER BY total_users DESC`
  },
  TIME_TO_VALUE: {
    category: 'Funnel', tables: ['wt_base44_users.base'],
    desc: 'Average hours from signup to key milestones.',
    marketing: '"Ship your first app in hours, not months"',
    sql: (s) => `SELECT
  round(avg(date_diff('hour', cast(created_date AS timestamp), first_message_added_ts)), 1) AS avg_hrs_to_first_message,
  round(avg(date_diff('hour', cast(created_date AS timestamp), first_app_published_ts)), 1) AS avg_hrs_to_first_publish,
  round(avg(date_diff('hour', cast(created_date AS timestamp), first_premium_ts)), 1) AS avg_hrs_to_premium
FROM prod.wt_base44_users.base
WHERE is_qa_user = false
  AND created_date >= current_date - interval '${s.lookback}' day
  AND first_message_added_ts IS NOT NULL`
  },
  MILESTONES: {
    category: 'Growth', tables: ['wt_base44_users.base'],
    desc: 'All-time totals for milestone announcements.',
    marketing: '"3.8M+ builders", milestone announcements, press kit',
    sql: () => `SELECT
  count(DISTINCT user_id) AS total_builders,
  count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) AS builders_who_published,
  count(DISTINCT CASE WHEN first_premium_ts IS NOT NULL THEN user_id END) AS total_ever_premium,
  count(DISTINCT CASE WHEN is_active_premium_user = true THEN user_id END) AS active_premium_now,
  min(created_date) AS platform_launch_date
FROM prod.wt_base44_users.base
WHERE is_qa_user = false`
  },
  APP_CATEGORIES: {
    category: 'Apps', tables: ['wt_apps.base'],
    desc: 'Top app verticals - what builders are building.',
    marketing: '"Builders create everything from CRMs to AI agents"',
    sql: (s) => `SELECT
  classification,
  count(DISTINCT id) AS app_count,
  round(100.0 * count(DISTINCT id) / sum(count(DISTINCT id)) OVER (), 1) AS pct_of_apps
FROM prod.wt_apps.base
WHERE classification IS NOT NULL AND classification != ''
GROUP BY 1
ORDER BY app_count DESC
LIMIT ${s.limit}`
  },
  USER_VOICE: {
    category: 'Voice', tables: ['cs_dwh.base44_user_voice_daily_pulse'],
    desc: 'Top issues reported by builders, ranked by highlight count.',
    marketing: 'Pain points, trending complaints, empathy-driven messaging',
    sql: (s) => `SELECT
  issue_title,
  count(DISTINCT highlight_id) AS highlight_count,
  count(DISTINCT ticket_id) AS ticket_count,
  count(DISTINCT CASE WHEN is_partner = true THEN highlight_id END) AS partner_highlights,
  max(execution_date) AS latest_report
FROM prod.cs_dwh.base44_user_voice_daily_pulse
WHERE execution_date >= current_date - interval '${s.lookback}' day
GROUP BY 1
ORDER BY highlight_count DESC
LIMIT ${s.limit}`
  },
  APP_CREATION_TREND: {
    category: 'Apps', tables: ['marketing.base44_user_generated_apps_v2'],
    desc: 'Weekly app creation and deployment trends.',
    marketing: '"Builders created X apps last week", app velocity',
    sql: (s) => {
      let where = `is_deleted = false\n  AND created_date >= current_date - interval '${s.lookback}' day`;
      if (s.vertical) where += `\n  AND LOWER(categories) LIKE '%${s.vertical}%'`;
      return `SELECT
  date_trunc('week', created_date) AS week,
  count(*) AS apps_created,
  count(CASE WHEN last_deployed_at IS NOT NULL THEN 1 END) AS apps_deployed,
  round(100.0 * count(CASE WHEN last_deployed_at IS NOT NULL THEN 1 END) / count(*), 1) AS deploy_rate_pct,
  count(CASE WHEN remixed_from_app_id IS NOT NULL THEN 1 END) AS remixed,
  count(CASE WHEN agents_enabled = true THEN 1 END) AS with_agents
FROM prod.marketing.base44_user_generated_apps_v2
WHERE ${where}
GROUP BY 1
ORDER BY 1 DESC`;
    }
  },
  APP_MODEL_PREFERENCES: {
    category: 'Models', tables: ['marketing.base44_user_generated_apps_v2'],
    desc: 'Which AI models builders select in the editor.',
    marketing: '"Most popular builder model choices"',
    sql: (s) => `SELECT
  model,
  count(*) AS app_count,
  round(100.0 * count(*) / sum(count(*)) OVER (), 1) AS pct_of_apps,
  count(CASE WHEN last_deployed_at IS NOT NULL THEN 1 END) AS deployed,
  round(100.0 * count(CASE WHEN last_deployed_at IS NOT NULL THEN 1 END) / NULLIF(count(*), 0), 1) AS deploy_rate_pct
FROM prod.marketing.base44_user_generated_apps_v2
WHERE is_deleted = false AND model IS NOT NULL AND model != 'default'
GROUP BY 1
ORDER BY app_count DESC`
  },
  APP_FEATURE_ADOPTION: {
    category: 'Apps', tables: ['marketing.base44_user_generated_apps_v2'],
    desc: 'Platform feature adoption rates across all active apps.',
    marketing: '"42% of apps use AI agents", feature adoption stories',
    sql: () => `SELECT
  count(*) AS total_apps,
  count(CASE WHEN agents_enabled = true THEN 1 END) AS agents_enabled,
  round(100.0 * count(CASE WHEN agents_enabled = true THEN 1 END) / count(*), 1) AS agents_pct,
  count(CASE WHEN deep_coding_mode = true THEN 1 END) AS deep_coding,
  round(100.0 * count(CASE WHEN deep_coding_mode = true THEN 1 END) / count(*), 1) AS deep_coding_pct,
  count(CASE WHEN connected_to_github = true THEN 1 END) AS github_connected,
  round(100.0 * count(CASE WHEN connected_to_github = true THEN 1 END) / count(*), 1) AS github_pct
FROM prod.marketing.base44_user_generated_apps_v2
WHERE is_deleted = false`
  },
  APP_REMIX_MARKETPLACE: {
    category: 'Apps', tables: ['marketing.base44_user_generated_apps_v2'],
    desc: 'Remix and marketplace activity.',
    marketing: '"X apps remixed from the community", marketplace traction',
    sql: () => `SELECT
  count(*) AS total_apps,
  count(CASE WHEN remixed_from_app_id IS NOT NULL THEN 1 END) AS remixed_apps,
  round(100.0 * count(CASE WHEN remixed_from_app_id IS NOT NULL THEN 1 END) / count(*), 1) AS remix_rate_pct,
  count(CASE WHEN is_marketplace_purchase = 'true' THEN 1 END) AS marketplace_purchases,
  count(DISTINCT remixed_from_app_id) AS unique_source_apps
FROM prod.marketing.base44_user_generated_apps_v2
WHERE is_deleted = false`
  },
  FUNNEL_DETAILED: {
    category: 'Funnel', tables: ['wt_base44_users.base_full'],
    desc: 'Full funnel with all touchpoints from signup to premium.',
    marketing: 'Full conversion funnel, drop-off analysis',
    sql: (s) => `SELECT
  count(DISTINCT user_id) AS total_builders,
  count(DISTINCT CASE WHEN first_anonymous_ts IS NOT NULL THEN user_id END) AS visited_anonymous,
  count(DISTINCT CASE WHEN first_message_added_ts IS NOT NULL THEN user_id END) AS sent_first_message,
  count(DISTINCT CASE WHEN first_app_published_ts IS NOT NULL THEN user_id END) AS published_app,
  count(DISTINCT CASE WHEN first_out_of_credits_ts IS NOT NULL THEN user_id END) AS hit_credit_wall,
  count(DISTINCT CASE WHEN first_package_picker_ts IS NOT NULL THEN user_id END) AS saw_pricing,
  count(DISTINCT CASE WHEN first_premium_ts IS NOT NULL THEN user_id END) AS converted_premium
FROM prod.wt_base44_users.base_full
WHERE is_qa_user = false
  AND created_date >= current_date - interval '${s.lookback}' day`
  },
  FUNNEL_TIME_DETAILED: {
    category: 'Funnel', tables: ['wt_base44_users.base_full'],
    desc: 'Average hours between each funnel step.',
    marketing: '"Builders go from signup to premium in X hours"',
    sql: (s) => `SELECT
  round(avg(date_diff('hour', cast(created_date AS timestamp), first_message_added_ts)), 1) AS hrs_to_first_message,
  round(avg(date_diff('hour', cast(created_date AS timestamp), first_app_published_ts)), 1) AS hrs_to_publish,
  round(avg(date_diff('hour', first_out_of_credits_ts, first_premium_ts)), 1) AS hrs_credit_wall_to_premium,
  round(avg(date_diff('hour', cast(created_date AS timestamp), first_premium_ts)), 1) AS hrs_to_premium
FROM prod.wt_base44_users.base_full
WHERE is_qa_user = false
  AND created_date >= current_date - interval '${s.lookback}' day
  AND first_message_added_ts IS NOT NULL`
  },
  REFERRAL_IMPACT: {
    category: 'Growth', tables: ['wt_base44_users.base_full'],
    desc: 'Referral-driven signups and their conversion rates.',
    marketing: '"Referred builders convert X% better"',
    sql: (s) => `SELECT
  count(DISTINCT user_id) AS total_builders,
  count(DISTINCT CASE WHEN referrer_user_id IS NOT NULL THEN user_id END) AS referred_builders,
  round(100.0 * count(DISTINCT CASE WHEN referrer_user_id IS NOT NULL THEN user_id END) / count(DISTINCT user_id), 1) AS referral_pct,
  count(DISTINCT CASE WHEN referrer_user_id IS NOT NULL AND first_premium_ts IS NOT NULL THEN user_id END) AS referred_premium,
  count(DISTINCT referrer_user_id) AS unique_referrers
FROM prod.wt_base44_users.base_full
WHERE is_qa_user = false
  AND created_date >= current_date - interval '${s.lookback}' day`
  },
  PAID_VS_FREE_APPS: {
    category: 'Monetization', tables: ['marketing.base44_apps_classified_by_ai', 'wt_base44_users.base_full'],
    desc: 'Apps and builders grouped by subscription tier. Joins classified apps with user profiles.',
    marketing: '"X% of apps come from paid builders", tier concentration',
    sql: (s) => {
      let where = 'u.is_qa_user = false';
      if (s.vertical) where += `\n  AND LOWER(a.category_by_ai) LIKE '%${s.vertical}%'`;
      return `SELECT
  CASE
    WHEN u.subscription_tier = 'free' THEN 'free'
    WHEN u.subscription_tier LIKE '%enterprise%' THEN 'enterprise'
    WHEN u.subscription_tier LIKE '%elite%' THEN 'elite'
    WHEN u.subscription_tier LIKE '%pro%' THEN 'pro'
    WHEN u.subscription_tier LIKE '%builder%' THEN 'builder'
    WHEN u.subscription_tier LIKE '%starter%' THEN 'starter'
    ELSE COALESCE(u.subscription_tier, 'unknown')
  END AS tier_group,
  u.is_active_premium_user,
  count(DISTINCT a.app_id) AS apps,
  count(DISTINCT a.organization_id) AS builders
FROM prod.marketing.base44_apps_classified_by_ai a
JOIN prod.wt_base44_users.base_full u
  ON a.organization_id = u.organization_id
WHERE ${where}
GROUP BY 1, 2
ORDER BY apps DESC`;
    }
  },
  APP_MONETIZATION_SIGNALS: {
    category: 'Monetization', tables: ['marketing.base44_apps_classified_by_ai'],
    desc: 'Stripe integration and AI-predicted payment likelihood.',
    marketing: '"X apps have high monetization potential"',
    sql: (s) => {
      let where = '1=1';
      if (s.vertical) where = `LOWER(a.category_by_ai) LIKE '%${s.vertical}%'`;
      return `SELECT
  a.has_stripe_integration,
  a.payments_likelihood_by_ai,
  count(*) AS apps,
  count(DISTINCT a.organization_id) AS builders
FROM prod.marketing.base44_apps_classified_by_ai a
WHERE ${where}
GROUP BY 1, 2
ORDER BY apps DESC`;
    }
  },
  APP_AI_CLASSIFICATION: {
    category: 'Monetization', tables: ['marketing.base44_apps_classified_by_ai'],
    desc: 'AI-classified app breakdown by category, industry, or audience.',
    marketing: '"Top verticals builders are targeting", industry penetration',
    sql: (s) => `SELECT
  a.category_by_ai, a.industry_by_ai,
  count(*) AS apps,
  count(DISTINCT a.organization_id) AS builders,
  count(CASE WHEN a.last_deployed_at IS NOT NULL THEN 1 END) AS deployed,
  round(100.0 * count(CASE WHEN a.last_deployed_at IS NOT NULL THEN 1 END) / count(*), 1) AS deploy_rate_pct
FROM prod.marketing.base44_apps_classified_by_ai a
GROUP BY 1, 2
ORDER BY apps DESC
LIMIT ${s.limit}`
  }
};

const PRESETS = {
  'Growth Dashboard': { query: 'GROWTH_WEEKLY', lookback: 84, limit: 20, vertical: '' },
  'Education Vertical': { query: 'PAID_VS_FREE_APPS', lookback: 30, limit: 20, vertical: 'education' },
  'Monetization': { query: 'APP_MONETIZATION_SIGNALS', lookback: 30, limit: 30, vertical: '' },
  'Full Funnel': { query: 'FUNNEL_DETAILED', lookback: 30, limit: 20, vertical: '' },
  'Model Wars': { query: 'APP_MODEL_PREFERENCES', lookback: 30, limit: 20, vertical: '' },
};

const CATEGORIES = ['All', 'Growth', 'Models', 'Funnel', 'Apps', 'Monetization', 'Voice'];

const state = {
  query: 'GROWTH_WEEKLY',
  lookback: 30,
  limit: 20,
  vertical: '',
  verticalEnabled: false,
  categoryFilter: 'All',
  activePreset: ''
};

function init() {
  renderPresets();
  renderCategories();
  renderQueryList();
  document.getElementById('limitInput').addEventListener('input', (e) => { state.limit = parseInt(e.target.value) || 20; updateAll(); });
  document.getElementById('lookbackSelect').addEventListener('change', (e) => { state.lookback = parseInt(e.target.value); updateAll(); });
  document.getElementById('verticalSelect').addEventListener('change', (e) => { state.vertical = e.target.value; updateAll(); });
  updateAll();
}

function renderPresets() {
  const el = document.getElementById('presets');
  el.innerHTML = Object.keys(PRESETS).map(name =>
    `<button class="preset-btn" onclick="applyPreset('${name}')">${name}</button>`
  ).join('');
}

function applyPreset(name) {
  const p = PRESETS[name];
  state.query = p.query;
  state.lookback = p.lookback;
  state.limit = p.limit;
  state.vertical = p.vertical;
  state.verticalEnabled = !!p.vertical;
  state.activePreset = name;
  document.getElementById('limitInput').value = p.limit;
  document.getElementById('lookbackSelect').value = p.lookback;
  document.getElementById('verticalSelect').value = p.vertical;
  const tog = document.getElementById('verticalToggle');
  const filt = document.getElementById('verticalFilter');
  if (state.verticalEnabled) { tog.classList.add('on'); filt.style.display = 'block'; }
  else { tog.classList.remove('on'); filt.style.display = 'none'; }
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
  updateAll();
}

function renderCategories() {
  const el = document.getElementById('categories');
  el.innerHTML = CATEGORIES.map(c =>
    `<div class="chip${c === 'All' ? ' active' : ''}" onclick="filterCategory('${c}')">${c}</div>`
  ).join('');
}

function filterCategory(cat) {
  state.categoryFilter = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.textContent === cat));
  renderQueryList();
}

function renderQueryList() {
  const el = document.getElementById('queryList');
  const entries = Object.entries(QUERIES).filter(([_, q]) =>
    state.categoryFilter === 'All' || q.category === state.categoryFilter
  );
  el.innerHTML = entries.map(([id, q]) =>
    `<div class="query-card${id === state.query ? ' active' : ''}" onclick="selectQuery('${id}')">
      <div class="qid">${id}</div>
      <div class="qlabel">${q.desc.split(' - ')[0].split('.')[0]}</div>
    </div>`
  ).join('');
}

function selectQuery(id) {
  state.query = id;
  state.activePreset = '';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  updateAll();
}

function toggleVertical() {
  state.verticalEnabled = !state.verticalEnabled;
  const tog = document.getElementById('verticalToggle');
  const filt = document.getElementById('verticalFilter');
  tog.classList.toggle('on');
  filt.style.display = state.verticalEnabled ? 'block' : 'none';
  if (!state.verticalEnabled) { state.vertical = ''; document.getElementById('verticalSelect').value = ''; }
  updateAll();
}

function updateAll() {
  renderQueryList();
  renderSQL();
  updatePrompt();
}

function renderSQL() {
  const q = QUERIES[state.query];
  document.getElementById('infoName').textContent = state.query;
  document.getElementById('infoTables').innerHTML = q.tables.map(t => `<span>prod.${t}</span>`).join(' + ');
  document.getElementById('queryDesc').innerHTML = `<strong>Purpose:</strong> ${q.desc}<br><strong>Marketing use:</strong> ${q.marketing}`;

  const sql = q.sql(state);
  const highlighted = sql
    .replace(/\b(SELECT|FROM|WHERE|JOIN|ON|GROUP BY|ORDER BY|LIMIT|WITH|AS|CASE|WHEN|THEN|ELSE|END|AND|OR|IS|NOT|NULL|IN|LIKE|OVER|DESC|ASC|DISTINCT|true|false)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(count|sum|avg|round|min|max|date_trunc|date_diff|lag|NULLIF|COALESCE|cast|LOWER)\b/gi, '<span class="fn">$1</span>')
    .replace(/'[^']*'/g, '<span class="str">$&</span>')
    .replace(/\bprod\.\w+\.\w+/g, '<span class="tbl">$&</span>')
    .replace(/\b\d+\.?\d*\b/g, (m) => {
      if (m.match(/^\d+$/)) return `<span class="num">${m}</span>`;
      return m;
    });
  document.getElementById('sqlPreview').innerHTML = highlighted;
}

function updatePrompt() {
  const q = QUERIES[state.query];
  const parts = [`Run the ${state.query} query from the data-insight skill`];

  if (state.lookback && state.lookback !== 30) {
    const label = state.lookback === 7 ? 'last 7 days' : state.lookback === 14 ? 'last 14 days' : state.lookback === 84 ? 'last 12 weeks' : state.lookback === 180 ? 'last 6 months' : state.lookback === 0 ? 'all time' : `last ${state.lookback} days`;
    parts.push(`for the ${label}`);
  }

  if (state.vertical) {
    parts.push(`filtered to the ${state.vertical} vertical`);
  }

  if (state.limit !== 20) {
    parts.push(`limit to ${state.limit} results`);
  }

  parts.push(`using Trino against ${q.tables.map(t => 'prod.' + t).join(' joined with ')}`);

  const prompt = parts.join(', ') + '. Format the results as a marketing-ready social proof block.';
  document.getElementById('promptText').textContent = prompt;
}

function copyPrompt() {
  const text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

init();
</script>
</body>
</html>
